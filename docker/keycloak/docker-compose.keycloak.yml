services:
  keycloak:
    image: keycloak/keycloak:26.2
    command: start-dev --import-realm
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      ## Set the hostname for the Keycloak server
      # KC_HOSTNAME: your.hostname.com
      
      # # Enable HTTPS by specifying a keystore with certificate and key
      # KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/tls.crt
      # KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/tls.key
      
    ports:
      - "80:8080"
      - "443:8443"

    volumes:
      - ./sample-damap-realm-export.json:/opt/keycloak/data/import/sample-damap-realm-export.json
      # - ./certs:/opt/keycloak/certs

  keycloak-db:
    image: postgres:16
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${PASSWORD}
      POSTGRES_DB: keycloak
      DB_VENDOR: postgres
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data

volumes:
  keycloak_db_data:
